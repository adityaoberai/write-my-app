<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
	<defs>
		<linearGradient id="tile" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#1d1b14" />
			<stop offset="1" stop-color="#0a0a08" />
		</linearGradient>
		<radialGradient id="warmth" cx="0.18" cy="0.16" r="0.85">
			<stop offset="0" stop-color="#e8b938" stop-opacity="0.10" />
			<stop offset="1" stop-color="#e8b938" stop-opacity="0" />
		</radialGradient>
	</defs>

	<!-- tile -->
	<rect width="256" height="256" rx="48" fill="#141310" />
	<rect width="256" height="256" rx="48" fill="url(#tile)" />
	<rect width="256" height="256" rx="48" fill="url(#warmth)" />

	<!-- chevron prompt `›` -->
	<path
		d="M 64 76 L 132 128 L 64 180"
		stroke="#e8b938"
		stroke-width="22"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>

	<!-- cursor block -->
	<rect x="150" y="120" width="44" height="16" rx="2" fill="#e8b938" />

	<!-- subtle inner edge -->
	<rect
		x="1.5"
		y="1.5"
		width="253"
		height="253"
		rx="46.5"
		fill="none"
		stroke="rgba(255, 248, 220, 0.06)"
		stroke-width="1"
	/>
</svg>
